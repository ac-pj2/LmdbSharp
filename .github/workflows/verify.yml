name: verify
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  battery:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Install python-lmdb (native differential validation)
        run: pip install lmdb || echo "diff mode will self-skip"
      - name: Full reliability battery
        run: bash scripts/verify.sh
